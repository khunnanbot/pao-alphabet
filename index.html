<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ပအိုဝ်ႏ ဗီး ၃၃-ဖြုံႏ တွမ်ႏ ဂဏန်ꩻ (Pa'O Alphabet Interactive Poster)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Welcome Screen Styles */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1s ease-out, visibility 1s;
        }

        #welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .welcome-content {
            text-align: center;
            animation: fadeInScale 1.5s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .flag-container {
            position: relative;
            width: 200px; /* Increased width */
            height: 250px; /* Increased height */
            margin: 0 auto 1.5rem;
        }

        .flag-pole {
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(to right, #475569, #94a3b8, #475569);
            border-radius: 4px;
            z-index: 2;
        }

        .pao-flag-img {
            position: absolute;
            left: 8px;
            top: 15px;
            width: 180px; /* Increased flag size */
            height: auto;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            animation: wave 3s infinite ease-in-out;
            transform-origin: left center;
            border-radius: 2px;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg) skew(0deg, 0deg); }
            25% { transform: rotate(1deg) skew(1deg, 2deg); }
            50% { transform: rotate(-1deg) skew(-1deg, -2deg); }
            75% { transform: rotate(1deg) skew(1deg, 1deg); }
        }

        .welcome-image {
            width: 400px; /* Increased image size */
            max-width: 90vw;
            height: auto;
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.6));
            animation: welcomeFloat 4s infinite ease-in-out;
        }

        @keyframes welcomeFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .welcome-text {
            color: #fcd34d;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .loading-bar-container {
            width: 200px;
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
            margin: 0 auto;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            animation: loadProgress 2.5s forwards ease-in-out;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        body.locked {
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1280px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(to right, #fcd34d, #fde047, #fcd34d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.125rem;
            color: #06b6d4;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.875rem;
            }
            .header p {
                font-size: 1rem;
            }
        }

        .capture-area {
            background: linear-gradient(to bottom, #1e293b, #0f172a);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 768px) {
            .capture-area {
                padding: 1rem;
            }
        }

        .section-title {
            font-size: 1.875rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .alphabet-title {
            color: #fbbf24;
        }

        .numbers-title {
            color: #06b6d4;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }



        .grid-5col {
            grid-template-columns: repeat(5, 1fr);
        }





        .card {
            position: relative;
            padding: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 110px; /* Default height */
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            width: 100%; /* Ensure cards take full width of their grid cell */
        }

        @media (max-width: 768px) {
            .card {
                min-height: 80px; /* Adjust height for smaller screens */
            }
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
        }

        .card:active {
            transform: scale(0.95);
        }

        .card-char {
            font-size: 2rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.5rem;
        }

        .card-pron {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-weight: 600;
        }

        .card.playing::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 0.75rem;
            background: rgba(255, 255, 255, 0.3);
            animation: pulse 1s infinite;
            border: 3px solid #fbbf24;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Color gradients */
        .red-gradient {
            background: linear-gradient(135deg, #f87171, #dc2626);
        }

        .green-gradient {
            background: linear-gradient(135deg, #4ade80, #16a34a);
        }

        .blue-gradient {
            background: linear-gradient(135deg, #60a5fa, #2563eb);
        }

        .yellow-gradient {
            background: linear-gradient(135deg, #fbbf24, #d97706);
        }

        .purple-gradient {
            background: linear-gradient(135deg, #c084fc, #a855f7);
        }

        .cyan-gradient {
            background: linear-gradient(135deg, #22d3ee, #0891b2);
        }

        .last-three {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-top: 0;
        }

        .last-three .card:nth-child(1) {
            grid-column: 2;
        }

        .last-three .card:nth-child(2) {
            grid-column: 3;
        }

        .last-three .card:nth-child(3) {
            grid-column: 4;
        }

        @media (max-width: 1024px) {
            .last-three {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .last-three .card:nth-child(1) {
                grid-column: 1;
            }
            
            .last-three .card:nth-child(2) {
                grid-column: 2;
            }
            
            .last-three .card:nth-child(3) {
                grid-column: 3;
            }
        }

        @media (max-width: 768px) {
            .last-three {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }
            
            .last-three .card:nth-child(1) {
                grid-column: 1;
            }
            
            .last-three .card:nth-child(2) {
                grid-column: 2;
            }
            
            .last-three .card:nth-child(3) {
                grid-column: 1 / 3;
                justify-self: center;
                max-width: 100%;
                width: 100%;
            }
            
            .card-char {
                font-size: 1.5rem;
            }
        }

        .numbers-grid {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .numbers-grid .card {
            width: 70px;
            height: 70px;
            min-height: auto;
        }

        .numbers-grid .card-char {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .numbers-grid .card-pron {
            font-size: 0.65rem;
        }

        @media (max-width: 768px) {
            .numbers-grid .card {
                width: 60px;
                height: 60px;
            }
            .numbers-grid .card-char {
                font-size: 1.25rem;
            }
        }

        .separator {
            border-top: 1px solid #475569;
            margin: 3rem 0;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(to right, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn:hover {
            background: linear-gradient(to right, #16a34a, #15803d);
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .download-icon {
            width: 1.25rem;
            height: 1.25rem;
        }

        .info-text {
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 1rem;
        }

        .audio-status {
            text-align: center;
            color: #fbbf24;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            min-height: 1.25rem;
        }
    </style>
</head>
<body class="locked">
    <!-- Welcome Screen -->
    <div id="welcome-screen">
        <div class="welcome-content">
            <div class="flag-container">
                <div class="flag-pole"></div>
                <img src="pao-flag.webp" alt="Pa'O Flag" class="pao-flag-img">
            </div>
            <img src="welcome-image.png" alt="Welcome" class="welcome-image">
            <div class="welcome-text">မင်္ဂလာပါ (Welcome)</div>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>ပအိုဝ်ႏ ဗီး ၃၃-ဖြုံႏ တွမ်ႏ ဂဏန်ꩻ</h1>
            <p>Pa'O Alphabet Interactive Poster</p>
        </div>

        <!-- Capture Area -->
        <div class="capture-area" id="captureArea">
            <!-- Alphabet Section -->
            <div>
                <h2 class="section-title alphabet-title">ပအိုဝ်ႏ ဗီး ၃၃- ဖြုံႏ</h2>
                
                <div class="grid grid-5col" id="alphabetGrid"></div>

                <!-- Last 3 letters -->
                <div class="last-three" id="lastThree"></div>
            </div>

            <!-- Separator -->
            <div class="separator"></div>

            <!-- Numbers Section -->
            <div>
                <h2 class="section-title numbers-title">ပအိုဝ်ႏ ဂဏန်ꩻ</h2>
                <div class="numbers-grid" id="numbersGrid"></div>
            </div>

            <div class="info-text">
                အက္ခရာ သို့မဟုတ် ဂဏန်းကို နှိပ်ပြီး အသံထွက်နားထောင်နိုင်ပါတယ်။
            </div>
            <div class="audio-status" id="audioStatus"></div>
        </div>

        <!-- Buttons -->
        <div class="button-container">
            <button class="btn" onclick="downloadImage()">
                <svg class="download-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                ပုံအဖြစ် သိမ်းဆည်းမည် (Save as Image)
            </button>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // Pa'O Alphabet Data
        const paoAlphabet = [
            { char: "က", pron: "က-ရီး", index: 1 },
            { char: "ခ", pron: "ခ-ရီး", index: 2 },
            { char: "ဂ", pron: "ဂ-ဆုဲင်ꩻ", index: 3 },
            { char: "ဃ", pron: "ဃ-ဆုဲင်ꩻ", index: 4 },
            { char: "င", pron: "င", index: 5 },
            { char: "စ", pron: "စ-ရီး", index: 6 },
            { char: "ဆ", pron: "ဆ-ရီး", index: 7 },
            { char: "ဇ", pron: "ဇ-ဆုဲင်ꩻ", index: 8 },
            { char: "ဈ", pron: "ဈ-ဆုဲင်ꩻ", index: 9 },
            { char: "ည", pron: "ည", index: 10 },
            { char: "ဋ", pron: "ဋ-ရီး", index: 11 },
            { char: "ဌ", pron: "ဌ-ရီး", index: 12 },
            { char: "ဍ", pron: "ဍ-ရီး", index: 13 },
            { char: "ဎ", pron: "ဎ-ထာꩻဝ", index: 14 },
            { char: "ဏ", pron: "ဏ-ရီး", index: 15 },
            { char: "တ", pron: "တ-ဆုဲင်ꩻ", index: 16 },
            { char: "ထ", pron: "ထ-ဆုဲင်ꩻ", index: 17 },
            { char: "ဒ", pron: "ဒ-ဆုဲင်ꩻ", index: 18 },
            { char: "ဓ", pron: "ဓ-ဆုဲင်ꩻသွတ်ꩻ", index: 19 },
            { char: "န", pron: "န-ဆုဲင်ꩻ", index: 20 },
            { char: "ပ", pron: "ပ", index: 21 },
            { char: "ဖ", pron: "ဖ-ရီး", index: 22 },
            { char: "ဗ", pron: "ဗ", index: 23 },
            { char: "ဘ", pron: "ဘ-ဆုဲင်ꩻ", index: 24 },
            { char: "မ", pron: "မ", index: 25 },
            { char: "ယ", pron: "ယ", index: 26 },
            { char: "ရ", pron: "ရ", index: 27 },
            { char: "လ", pron: "လ-ရီး", index: 28 },
            { char: "ဝ", pron: "ဝ", index: 29 },
            { char: "သ", pron: "သ", index: 30 },
            { char: "ဟ", pron: "ဟ", index: 31 },
            { char: "ဠ", pron: "ဠ-ဆုဲင်ꩻ", index: 32 },
            { char: "အံ", pron: "အ", index: 33 }
        ];

        // Pa'O Numbers
        const paoNumbers = [
            { char: "၁", pron: "တာ", index: 1 },
            { char: "၂", pron: "နီ", index: 2 },
            { char: "၃", pron: "သွံ", index: 3 },
            { char: "၄", pron: "လစ်ꩻ", index: 4 },
            { char: "၅", pron: "ငတ်ꩻ", index: 5 },
            { char: "၆", pron: "သူ", index: 6 },
            { char: "၇", pron: "နိုတ်ꩻ", index: 7 },
            { char: "၈", pron: "သွစ်ꩻ", index: 8 },
            { char: "၉", pron: "ကွတ်ꩻ", index: 9 },
            { char: "၀", pron: "သုည", index: 0 }
        ];

        const colorClasses = [
            "red-gradient",
            "green-gradient",
            "blue-gradient",
            "yellow-gradient",
            "purple-gradient"
        ];

        let playingIndex = null;
        const audioPlayer = document.getElementById('audioPlayer');
        const audioStatus = document.getElementById('audioStatus');

        function playAudio(uniqueId, index, isNumber = false) {
            // Stop current audio if any
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            
            playingIndex = uniqueId;
            updatePlayingStates();

            // Set audio source - use different folders for numbers and alphabet
            const audioFolder = isNumber ? 'audio_numbers/' : 'audio/';
            const audioPath = audioFolder + index + '.mp3';
            audioPlayer.src = audioPath;
            
            audioPlayer.play().then(() => {
                audioStatus.textContent = '';
            }).catch(err => {
                console.log("Error playing audio:", err);
                audioStatus.textContent = '🔊 အသံဖိုင် မရှိသေးပါ။ (' + index + '.mp3)';
                playingIndex = null;
                updatePlayingStates();
            });

            audioPlayer.onended = () => {
                playingIndex = null;
                updatePlayingStates();
            };
        }

        function updatePlayingStates() {
            document.querySelectorAll('.card').forEach(card => {
                const cardId = card.dataset.id;
                if (cardId === playingIndex) {
                    card.classList.add('playing');
                } else {
                    card.classList.remove('playing');
                }
            });
        }

        function createCard(item, colorClass, isNumber = false) {
            const card = document.createElement('div');
            card.className = `card ${colorClass}`;
            // Create unique ID for alphabet and numbers
            const uniqueId = isNumber ? `num-${item.index}` : `alpha-${item.index}`;
            card.dataset.id = uniqueId;
            card.dataset.index = item.index;
            card.dataset.isNumber = isNumber;
            card.onclick = () => playAudio(uniqueId, item.index, isNumber);
            card.innerHTML = `
                <div class="card-char">${item.char}</div>
                <div class="card-pron">${item.pron}</div>
            `;
            return card;
        }

        function initializeAlphabet() {
            const alphabetGrid = document.getElementById('alphabetGrid');
            const lastThree = document.getElementById('lastThree');

            // First 30 letters
            paoAlphabet.slice(0, 30).forEach((item, idx) => {
                const colorClass = colorClasses[idx % colorClasses.length];
                alphabetGrid.appendChild(createCard(item, colorClass));
            });

            // Last 3 letters - use colors from index 1, 2, 3 (Green, Blue, Yellow) to match the pattern
            paoAlphabet.slice(30, 33).forEach((item, idx) => {
                const colorClass = colorClasses[idx + 1];
                lastThree.appendChild(createCard(item, colorClass));
            });
        }

        function initializeNumbers() {
            const numbersGrid = document.getElementById('numbersGrid');
            paoNumbers.forEach(item => {
                numbersGrid.appendChild(createCard(item, 'cyan-gradient', true));
            });
        }

        async function downloadImage() {
            try {
                // Load html2canvas from CDN
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                script.onload = () => {
                    const captureArea = document.getElementById('captureArea');
                    html2canvas(captureArea, {
                        backgroundColor: '#0f172a',
                        scale: 2
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.href = canvas.toDataURL('image/png');
                        link.download = 'pao-alphabet.png';
                        link.click();
                    }).catch(err => {
                        alert('ပုံ download လုပ်ရာတွင် အမှားအယွင်းရှိပါတယ်။');
                        console.error(err);
                    });
                };
                document.head.appendChild(script);
            } catch (error) {
                alert('ပုံ download လုပ်ရာတွင် အမှားအယွင်းရှိပါတယ်။');
                console.error(error);
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeAlphabet();
            initializeNumbers();
            audioStatus.textContent = '🔊 အသံထွက်အတွက် အက္ခရာ သို့မဟုတ် ဂဏန်းကို နှိပ်ပါ။';

            // Welcome Screen Handling
            setTimeout(() => {
                const welcomeScreen = document.getElementById('welcome-screen');
                welcomeScreen.classList.add('hidden');
                document.body.classList.remove('locked');
            }, 4000); // Increased to 4 seconds to enjoy the animation
        });
    </script>
</body>
</html>
