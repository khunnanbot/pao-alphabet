<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ပအိုဝ်ႏ ဗီး ၃၃-ဖြုံႏ တွမ်ႏ ဂဏန်ꩻ (Pa'O Alphabet Interactive Poster)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Welcome Screen Styles */
        .welcome-content {
            position: absolute;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            gap: 2rem;
            top: 0;
            left: 0;
        }

        .flag-container {
            position: relative;
            z-index: 10;
        }

        .welcome-image {
            position: relative;
            z-index: 10;
        }

        .welcome-text {
            position: relative;
            z-index: 10;
        }

        .loading-bar-container {
            position: relative;
            z-index: 10;
        }

        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom right, #0f172a, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            visibility: visible;
            transition: opacity 1s ease-out, visibility 1s;
            overflow: hidden;
        }

        #welcome-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .welcome-content {
            text-align: center;
            animation: fadeInScale 1.5s ease-out;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .flag-container {
            position: relative;
            width: 200px;
            height: 250px;
            margin: 0 auto 1.5rem;
        }

        .flag-pole {
            position: absolute;
            left: 0;
            top: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(to right, #475569, #94a3b8, #475569);
            border-radius: 4px;
            z-index: 2;
        }

        .pao-flag-img {
            position: absolute;
            top: 0;
            left: 8px;
            width: 200px;
            height: 200px;
            object-fit: cover;
            animation: flagWave 3s ease-in-out infinite;
            transform-origin: left center;
            z-index: 3;
        }

        @keyframes flagWave {
            0%, 100% { transform: rotateY(0deg); }
            50% { transform: rotateY(-15deg); }
        }

        .welcome-image {
            width: 300px;
            height: 300px;
            object-fit: contain;
            animation: bounceIn 2s ease-out;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: translateY(-50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .welcome-text {
            font-size: 2rem;
            font-weight: bold;
            color: #fbbf24;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .loading-bar-container {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            animation: loading 5s ease-in-out forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* Falling Alphabets */
        .falling-alphabets {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .falling-letter {
            position: absolute;
            top: -50px;
            font-size: 3.5rem;
            font-weight: bold;
            opacity: 0.7;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(calc(100vh + 100px)) rotate(360deg);
                opacity: 0;
            }
        }

        body {
            background: linear-gradient(to bottom right, #0f172a, #1e293b);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }

        body.locked {
            overflow: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.125rem;
            color: #94a3b8;
        }

        .capture-area {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.875rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .alphabet-title {
            color: #fbbf24;
        }

        .numbers-title {
            color: #06b6d4;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .grid-5col {
            grid-template-columns: repeat(5, 1fr);
        }

        .card {
            position: relative;
            padding: 1rem;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 110px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            width: 100%;
        }

        @media (max-width: 768px) {
            .card {
                min-height: 80px;
            }
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
        }

        .card:active {
            transform: scale(0.95);
        }

        .card-char {
            font-size: 2rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 0.5rem;
        }

        .card-pron {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            font-weight: 600;
        }

        .card.playing::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 0.75rem;
            background: rgba(255, 255, 255, 0.3);
            animation: pulse 1s infinite;
            border: 3px solid #fbbf24;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Color gradients */
        .red-gradient {
            background: linear-gradient(135deg, #f87171, #dc2626);
        }

        .green-gradient {
            background: linear-gradient(135deg, #4ade80, #22c55e);
        }

        .blue-gradient {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
        }

        .yellow-gradient {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
        }

        .purple-gradient {
            background: linear-gradient(135deg, #c084fc, #a855f7);
        }

        .cyan-gradient {
            background: linear-gradient(135deg, #22d3ee, #06b6d4);
        }

        .last-three {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            gap: 0.75rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .numbers-grid .card {
            width: 60px;
            height: 60px;
            padding: 0.5rem;
            min-height: auto;
        }

        .numbers-grid .card-char {
            font-size: 1.5rem;
        }

        .numbers-grid .card-pron {
            font-size: 0.65rem;
        }

        @media (max-width: 768px) {
            .numbers-grid .card {
                width: 60px;
                height: 60px;
            }
            .numbers-grid .card-char {
                font-size: 1.25rem;
            }
        }

        .separator {
            border-top: 1px solid #475569;
            margin: 3rem 0;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            background: linear-gradient(to right, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        .btn:hover {
            background: linear-gradient(to right, #16a34a, #15803d);
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .download-icon {
            width: 1.25rem;
            height: 1.25rem;
        }

        .info-text {
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
            margin-top: 1rem;
        }

        .audio-status {
            text-align: center;
            color: #fbbf24;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            min-height: 1.25rem;
        }
    </style>
</head>
<body class="locked">
    <!-- Welcome Screen -->
    <div id="welcome-screen">
        <div class="welcome-content">
            <div class="falling-alphabets" id="fallingAlphabets"></div>
            <div class="flag-container">
                <div class="flag-pole"></div>
                <img src="pao-flag.webp" alt="Pa'O Flag" class="pao-flag-img">
            </div>
            <img src="welcome-image.png" alt="Welcome" class="welcome-image">
            <div class="welcome-text">မင်္ဂလာပါ (Welcome)</div>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>ပအိုဝ်ႏ ဗီး ၃၃-ဖြုံႏ တွမ်ႏ ဂဏန်ꩻ</h1>
            <p>Pa'O Alphabet Interactive Poster</p>
        </div>

        <!-- Capture Area -->
        <div class="capture-area" id="captureArea">
            <!-- Alphabet Section -->
            <div>
                <h2 class="section-title alphabet-title">ပအိုဝ်ႏ ဗီး ၃၃- ဖြုံႏ</h2>
                
                <div class="grid grid-5col" id="alphabetGrid"></div>

                <!-- Last 3 letters -->
                <div class="last-three" id="lastThree"></div>
            </div>

            <!-- Separator -->
            <div class="separator"></div>

            <!-- Numbers Section -->
            <div>
                <h2 class="section-title numbers-title">ပအိုဝ်ႏ ဂဏန်ꩻ</h2>
                <div class="numbers-grid" id="numbersGrid"></div>
            </div>

            <div class="info-text">
                အက္ခရာ သို့မဟုတ် ဂဏန်းကို နှိပ်ပြီး အသံထွက်နားထောင်နိုင်ပါတယ်။
            </div>
            <div class="audio-status" id="audioStatus"></div>
        </div>

        <!-- Buttons -->
        <div class="button-container">
            <button class="btn" onclick="downloadImage()">
                <svg class="download-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                ပုံအဖြစ် သိမ်းဆည်းမည် (Save as Image)
            </button>
        </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
        // Pa'O Alphabet Data
        const paoAlphabet = [
            { char: "က", pron: "က-ရီး", index: 1 },
            { char: "ခ", pron: "ခ-ရီး", index: 2 },
            { char: "ဂ", pron: "ဂ-ဆုဲင်ꩻ", index: 3 },
            { char: "ဃ", pron: "ဃ-ဆုဲင်ꩻ", index: 4 },
            { char: "င", pron: "င", index: 5 },
            { char: "စ", pron: "စ-ရီး", index: 6 },
            { char: "ဆ", pron: "ဆ-ရီး", index: 7 },
            { char: "ဇ", pron: "ဇ-ဆုဲင်ꩻ", index: 8 },
            { char: "ဈ", pron: "ဈ-ဆုဲင်ꩻ", index: 9 },
            { char: "ည", pron: "ည", index: 10 },
            { char: "ဋ", pron: "ဋ-ရီး", index: 11 },
            { char: "ဌ", pron: "ဌ-ရီး", index: 12 },
            { char: "ဍ", pron: "ဍ-ဆုဲင်ꩻ", index: 13 },
            { char: "ဎ", pron: "ဎ-ဆုဲင်ꩻ", index: 14 },
            { char: "ဏ", pron: "ဏ", index: 15 },
            { char: "တ", pron: "တ-ရီး", index: 16 },
            { char: "ထ", pron: "ထ-ရီး", index: 17 },
            { char: "ဒ", pron: "ဒ-ဆုဲင်ꩻ", index: 18 },
            { char: "ဓ", pron: "ဓ-ဆုဲင်ꩻ", index: 19 },
            { char: "န", pron: "န", index: 20 },
            { char: "ပ", pron: "ပ-ရီး", index: 21 },
            { char: "ဖ", pron: "ဖ-ရီး", index: 22 },
            { char: "ဗ", pron: "ဗ-ဆုဲင်ꩻ", index: 23 },
            { char: "ဘ", pron: "ဘ-ဆုဲင်ꩻ", index: 24 },
            { char: "မ", pron: "မ", index: 25 },
            { char: "ယ", pron: "ယ", index: 26 },
            { char: "ရ", pron: "ရ", index: 27 },
            { char: "လ", pron: "လ", index: 28 },
            { char: "ဝ", pron: "ဝ", index: 29 },
            { char: "သ", pron: "သ", index: 30 },
            { char: "ဟ", pron: "ဟ", index: 31 },
            { char: "ဠ", pron: "ဠ", index: 32 },
            { char: "အ", pron: "အ", index: 33 }
        ];

        const paoNumbers = [
            { char: "၀", pron: "သုည", index: 0 },
            { char: "၁", pron: "တစ်", index: 1 },
            { char: "၂", pron: "နှစ်", index: 2 },
            { char: "၃", pron: "သုံး", index: 3 },
            { char: "၄", pron: "လေး", index: 4 },
            { char: "၅", pron: "ငါး", index: 5 },
            { char: "၆", pron: "ခြောက်", index: 6 },
            { char: "၇", pron: "ခုနစ်", index: 7 },
            { char: "၈", pron: "ရှစ်", index: 8 },
            { char: "၉", pron: "ကိုး", index: 9 }
        ];

        const colorClasses = ['red-gradient', 'green-gradient', 'blue-gradient', 'yellow-gradient', 'purple-gradient'];

        let playingIndex = null;
        const audioPlayer = document.getElementById('audioPlayer');
        const audioStatus = document.getElementById('audioStatus');

        function playAudio(uniqueId, index, isNumber = false) {
            // Stop current audio if any
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
            
            playingIndex = uniqueId;
            updatePlayingStates();

            // Set audio source - use different folders for numbers and alphabet
            const audioFolder = isNumber ? 'audio_numbers/' : 'audio/';
            const audioPath = audioFolder + index + '.mp3';
            audioPlayer.src = audioPath;
            
            audioPlayer.play().then(() => {
                audioStatus.textContent = '';
            }).catch(err => {
                console.log("Error playing audio:", err);
                audioStatus.textContent = '🔊 အသံဖိုင် မရှိသေးပါ။ (' + index + '.mp3)';
                playingIndex = null;
                updatePlayingStates();
            });

            audioPlayer.onended = () => {
                playingIndex = null;
                updatePlayingStates();
            };
        }

        function updatePlayingStates() {
            document.querySelectorAll('.card').forEach(card => {
                const cardId = card.dataset.id;
                if (cardId === playingIndex) {
                    card.classList.add('playing');
                } else {
                    card.classList.remove('playing');
                }
            });
        }

        function createCard(item, colorClass, isNumber = false) {
            const card = document.createElement('div');
            card.className = `card ${colorClass}`;
            // Create unique ID for alphabet and numbers
            const uniqueId = isNumber ? `num-${item.index}` : `alpha-${item.index}`;
            card.dataset.id = uniqueId;
            card.dataset.index = item.index;
            card.dataset.isNumber = isNumber;
            card.onclick = () => playAudio(uniqueId, item.index, isNumber);
            card.innerHTML = `
                <div class="card-char">${item.char}</div>
                <div class="card-pron">${item.pron}</div>
            `;
            return card;
        }

        function initializeAlphabet() {
            const alphabetGrid = document.getElementById('alphabetGrid');
            const lastThree = document.getElementById('lastThree');

            // First 30 letters
            paoAlphabet.slice(0, 30).forEach((item, idx) => {
                const colorClass = colorClasses[idx % colorClasses.length];
                alphabetGrid.appendChild(createCard(item, colorClass));
            });

            // Last 3 letters - use colors from index 1, 2, 3 (Green, Blue, Yellow) to match the pattern
            paoAlphabet.slice(30, 33).forEach((item, idx) => {
                const colorClass = colorClasses[idx + 1];
                lastThree.appendChild(createCard(item, colorClass));
            });
        }

        function initializeNumbers() {
            const numbersGrid = document.getElementById('numbersGrid');
            paoNumbers.forEach(item => {
                numbersGrid.appendChild(createCard(item, 'cyan-gradient', true));
            });
        }

        async function downloadImage() {
            try {
                // Load html2canvas from CDN
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                script.onload = () => {
                    const captureArea = document.getElementById('captureArea');
                    html2canvas(captureArea, {
                        backgroundColor: '#0f172a',
                        scale: 2
                    }).then(canvas => {
                        const link = document.createElement('a');
                        link.href = canvas.toDataURL('image/png');
                        link.download = 'pao-alphabet.png';
                        link.click();
                    }).catch(err => {
                        alert('ပုံ download လုပ်ရာတွင် အမှားအယွင်းရှိပါတယ်။');
                        console.error(err);
                    });
                };
                document.head.appendChild(script);
            } catch (error) {
                alert('ပုံ download လုပ်ရာတွင် အမှားအယွင်းရှိပါတယ်။');
                console.error(error);
            }
        }

        // Falling Alphabet Animation Function
        function createFallingAlphabets() {
            const alphabets = [
                'က', 'ခ', 'ဂ', 'ဃ', 'င',
                'စ', 'ဆ', 'ဇ', 'ဈ', 'ည',
                'ဋ', 'ဌ', 'ဍ', 'ဎ', 'ဏ',
                'တ', 'ထ', 'ဒ', 'ဓ', 'န',
                'ပ', 'ဖ', 'ဗ', 'ဘ', 'မ',
                'ယ', 'ရ', 'လ', 'ဝ', 'သ',
                'ဟ', 'ဠ', 'အံ'
            ];

            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#6c5ce7', '#a29bfe', '#fd79a8', '#fdcb6e', '#6c7a89', '#00b894', '#ff7675', '#74b9ff', '#fab1a0', '#55efc4', '#81ecec'];

            const container = document.getElementById('fallingAlphabets');
            
            const interval = setInterval(() => {
                if (document.getElementById('welcome-screen').classList.contains('hidden')) {
                    clearInterval(interval);
                    return;
                }

                const randomAlphabet = alphabets[Math.floor(Math.random() * alphabets.length)];
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                const letter = document.createElement('div');
                letter.className = 'falling-letter';
                letter.textContent = randomAlphabet;
                // Generate position: full width (0-100%) for background effect
                const leftPos = Math.random() * 100;
                letter.style.left = leftPos + '%';
                letter.style.color = randomColor;
                letter.style.animationDuration = (4 + Math.random() * 2) + 's';
                letter.style.animationDelay = Math.random() * 0.5 + 's';
                
                container.appendChild(letter);
                
                setTimeout(() => {
                    letter.remove();
                }, (4 + Math.random() * 2 + Math.random() * 0.5) * 1000);
            }, 200);
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            initializeAlphabet();
            initializeNumbers();
            audioStatus.textContent = '🔊 အသံထွက်အတွက် အက္ခရာ သို့မဟုတ် ဂဏန်းကို နှိပ်ပါ။';

            // Start falling alphabet animation
            createFallingAlphabets();

            // Welcome Screen Handling
            setTimeout(() => {
                const welcomeScreen = document.getElementById('welcome-screen');
                welcomeScreen.classList.add('hidden');
                document.body.classList.remove('locked');
            }, 5000); // 5 seconds for full animation
        });
    </script>
</body>
</html>
